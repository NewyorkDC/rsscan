# render.yaml — Render.com 배포 설정
services:
  - type: web
    name: rsscan-etf-screener
    runtime: node
    buildCommand: npm install
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: TELEGRAM_BOT_TOKEN
        sync: false   # 대시보드에서 직접 입력
    autoDeploy: true
