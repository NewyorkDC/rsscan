name: 🚀 Daily RSSCAN Analysis (5-Gate + Strategy Room + Universe Update)

on:
  schedule:
    - cron: '0 20,21 * * *'  # UTC 기준 (한국시간 오전 5~6시, 미국 장 마감 후)
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write
  actions: read

jobs:
  daily_analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Step 1: 저장소 체크아웃
      - name: ✅ Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # 전체 히스토리 (push 충돌 시 rebase 안정화)

      # Step 2: Python 3.10 설정
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: 의존성 설치
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies installed"

      # Step 4: 🌐 동적 Universe 생성 (시총/거래량 필터) — 먼저 실행
      - name: 🌐 Build Dynamic Universe
        run: |
          echo "🌐 동적 universe 생성 중 (NASDAQ/NYSE/AMEX 시총 필터)..."
          python build_universe.py
          echo "✅ 동적 universe 생성 완료"

      # Step 4.5: 📊 Investable Universe 저장 (build 결과 변환, yfinance 미사용)
      - name: 📊 Save Investable Universe
        run: |
          echo "🔄 Investable Universe 저장 중..."
          python update_universe.py
          echo "✅ 유니버스 저장 완료"

      # Step 5: 📈 RS Line 데이터 수집 (동적 universe 기반)
      - name: 📈 Fetch RS Line Data
        run: |
          echo "📊 RS Line 기초 데이터 수집 중..."
          python fetch_sp500_data.py
          echo "✅ 데이터 수집 완료"

      # Step 6: 🔍 5-Gate Funnel 분석 실행
      - name: 🔍 Run 5-Gate Funnel Analysis
        run: |
          echo "🔧 5-Gate Funnel 필터링 중..."
          python generate_rsscan_daily.py
          echo "✅ 5-Gate 분석 완료"

      # Step 6.3: 🏦 재무 보강 (B그룹: 통과 종목만 EPS/매출/마진)
      - name: 🏦 Enrich Fundamentals
        run: |
          echo "🏦 5-Gate 통과 종목 재무 데이터 보강 중..."
          python enrich_fundamentals.py
          echo "✅ 재무 보강 완료"

      # Step 6.5: 📊 Market Pulse 분석 (지수/Regime/Breadth)
      - name: 📊 Run Market Pulse Analysis
        run: |
          echo "📈 시장 지수 및 Regime 분석 중..."
          python market_pulse.py
          echo "✅ Market Pulse 완료"

      # Step 7: 🏛️ Strategy Room v5 Paper-Trade 실행
      - name: 🏛️ Run Strategy Room v5 Paper-Trade
        run: |
          echo "📊 포트폴리오 시뮬레이션 중..."
          python strategy_room.py
          echo "✅ Strategy Room 완료"

      # Step 8: ✔️ 출력 파일 검증
      - name: ✔️ Verify output files
        run: |
          echo "📁 생성된 파일 확인 중..."
          ls -lh results/
          echo ""
          echo "파일 목록:"
          echo "  - investable_universe.json: $(wc -l < results/investable_universe.json) 줄"
          echo "  - daily_ibd_scan.json: $([ -f results/daily_ibd_scan.json ] && echo '✅ 있음' || echo '❌ 없음')"
          echo "  - entry_signals.json: $([ -f results/entry_signals.json ] && echo '✅ 있음' || echo '❌ 없음')"
          echo "  - strategy_room_portfolio.json: $([ -f results/strategy_room_portfolio.json ] && echo '✅ 있음' || echo '❌ 없음')"

      # Step 9: 🔧 Git 설정
      - name: 🔧 Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      # Step 10: ✏️ 변경사항 확인
      - name: ✏️ Check Git status
        run: |
          echo "Git 상태:"
          git status --short
          echo ""
          echo "변경된 파일들:"
          git diff --name-only

      # Step 11: 💾 결과 커밋 & 푸시
      - name: 💾 Commit and push results
        run: |
          # results 폴더가 존재하고 변경사항이 있는지 확인
          if [ -d "results" ] && [ -n "$(git status --porcelain results/)" ]; then
            echo "🚀 분석 결과를 커밋하는 중..."
            
            # 커밋 메시지에 타임스탬프 추가
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
            git add results/
            
            echo "커밋 메시지:"
            echo "🔄 Auto-update: Daily analysis results [$TIMESTAMP]"
            echo ""
            
            git commit -m "🔄 Auto-update: Daily analysis results [$TIMESTAMP]"
            
            echo "🚀 저장소에 푸시하는 중..."
            # 원격에 다른 변경(웹 에디터 커밋 등)이 있어도 충돌 없이 push.
            # 최대 3회 재시도: pull --rebase로 원격 변경을 먼저 당겨온 뒤 push.
            PUSHED=0
            for i in 1 2 3; do
              if git push origin main; then
                PUSHED=1
                echo "✅ 결과 푸시 완료 (시도 $i)"
                break
              fi
              echo "⚠️ push 거부됨 (시도 $i) — 원격 변경을 rebase로 통합 후 재시도..."
              git pull --rebase origin main || true
            done
            if [ "$PUSHED" != "1" ]; then
              echo "❌ 3회 시도 후에도 push 실패 — 다음 실행에서 재시도됩니다"
            fi
          else
            echo "⚠️ 변경사항이 없거나 results 폴더가 없습니다"
          fi

      # Step 12: 🚀 Vercel 강제 배포 트리거 (Deploy Hook)
      - name: 🚀 Trigger Vercel Deployment
        if: success()
        run: |
          echo "📢 Vercel 배포 트리거 중..."
          curl -X POST \
            -H "Content-Type: application/json" \
            "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo ""
          echo "✅ Vercel 배포 요청 완료!"
          echo "🔗 대시보드: https://rsscan.vercel.app"

      # Step 13: ❌ 실패 시 알림
      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "❌ Workflow 실패!"
          echo "Repository: ${{ github.repository }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "See details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # Step 14: 📊 작업 완료 요약
      - name: 📊 Workflow Summary
        if: always()
        run: |
          echo "=========================================="
          echo "✅ RSSCAN Daily Analysis Complete"
          echo "=========================================="
          echo "📊 Analysis Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "📁 Results location: results/"
          echo "📋 Files generated:"
          echo "   - investable_universe.json (우량주 유니버스)"
          echo "   - investable_universe.csv (표 형식)"
          echo "   - daily_ibd_scan.json (기초 데이터)"
          echo "   - entry_signals.json (5-Gate 통과 종목)"
          echo "   - strategy_room_portfolio.json (포트폴리오)"
          echo "🔗 Dashboard: https://rsscan.vercel.app"
          echo "📊 GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=========================================="
